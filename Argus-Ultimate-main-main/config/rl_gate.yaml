# config/rl_gate.yaml
# ====================
# RL Inference Gate configuration fragment.
#
# This file is consumed by RLInferenceGate.from_config() via ArgusConfig.ai.
# Merge it into your active profile (e.g. config/profiles/production.yaml)
# or reference it directly in unified_config.yaml under the `ai:` key.
#
# To ENABLE the gate:
#   1. Set ai.rl_enabled: true  (below)
#   2. Set env var: ARGUS_RL_INFERENCE=1
#   3. Ensure models/rl_policy.pt exists (run scripts/export_rl_checkpoint.py)
#
# Both the config flag AND the env var are required as a safety double-lock.
# This prevents accidental live activation from a stale config file.

ai:
  # Master switch — also requires ARGUS_RL_INFERENCE=1 env var
  rl_enabled: false

  # Path to model checkpoint directory (relative to project root)
  model_dir: "models/"

  # RL algorithm (informational — actual training uses RLTuner PPO)
  rl_algorithm: PPO

  # GPU index for inference (null = CPU)
  # Set to 0 for RTX 3070 Ti / RTX 5070 once available
  gpu_index: null

  # Number of MC-Dropout forward passes for confidence estimation
  # Higher = more accurate but slower. 5 is a good default.
  inference_batch_size: 5

  # RL gate tuning
  rl_gate:
    # If P(flat/skip) > flat_threshold AND flat is the argmax, skip the trade
    flat_threshold: 0.55

    # MC-Dropout samples (overrides inference_batch_size for gate specifically)
    mc_samples: 5

    # How frequently RLTuner updates the policy (in signal steps)
    online_update_every_n_steps: 64

    # Maximum drawdown before online updates are paused
    max_dd_gate: 0.15

    # PPO hyperparameters for online updates
    ppo:
      lr: 3.0e-5
      clip_ratio: 0.20
      entropy_coef: 0.01
      value_coef: 0.50
      gamma: 0.99
      lambda_dd: 2.0

  # JAX backend disabled — gate uses native PyTorch
  jax_backend: false
