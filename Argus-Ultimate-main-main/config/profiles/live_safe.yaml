runtime:
  mode: live
  institutional_mode: true
  live_require_paper_edge: true
  live_min_trades_paper: 80
  live_min_win_rate_pct: 55
  soak_gate:
    enabled: true
    max_age_hours: 8
    min_duration_seconds: 21600
    min_decision_count: 300
    min_trade_count: 20
    max_error_rate: 0.03
    max_timeout_rate: 0.03
    max_reconciliation_halts: 0
    max_duplicate_intents: 0

runtime_safety:
  latency_grace_cycles: 2
  live_safe_disable_pinnacle_ai_brain: true

market_data:
  ohlcv_cache_seconds: 30
  ohlcv_poll_interval_seconds: 60
  ohlcv_retry_attempts: 2

ai_brain:
  enabled: false

capital:
  max_position_pct: 0.05
  max_total_exposure_pct: 0.20
  max_position_size_aud: 75
  max_concurrent_positions: 2

risk:
  max_daily_loss_pct: 0.01
  max_drawdown_pct: 0.05
  max_trades_per_day: 12
  symbol_cooldown_cycles: 6
  max_fees_equity_pct: 1.0
  loss_streak_cooldown_trigger: 2
  loss_streak_cooldown_cycles: 6

reconciliation:
  interval_cycles: 1
  live_every_cycle: true
  require_operator_ack: true
  small_drift_pct: 0.01
  halt_drift_pct: 0.03

execution_engine:
  fail_closed_runtime_enabled: true
  fail_closed_runtime_enforce_paper: false
  fail_closed_max_exchange_heartbeat_age_seconds: 15
  fail_closed_max_market_data_age_seconds: 15
  fail_closed_max_ticker_age_seconds: 15
  fail_closed_max_clock_skew_seconds: 2
  fail_closed_require_clock_sync: true

edge_cost_gate:
  enabled: true
  live_buffer_mult: 1.6
  live_min_edge_pct: 0.10

portfolio_target_engine:
  enabled: true
  rebalance_min_delta_pct: 0.03

execution_alpha_engine:
  enabled: true
  maker_spread_threshold_bps: 3
  min_fill_probability: 0.45
  slice_threshold_pct: 0.02
  maker_fallback_seconds: 6
  telemetry_window: 300

trading_pairs:
  - BTC/USD
  - ETH/USD

strategies:
  strategy_whitelist:
    - momentum
    - mean_reversion
    - breakout

multi_language:
  enabled: false

continuous_scan:
  enabled: false

hft:
  enabled: false
  use_advanced_hft_infrastructure: false

self_improvement:
  enabled: false

evolution:
  continuous_enabled: false

strategy_library:
  enabled: false

quantum_features:
  enabled: false

quant_fund_upgrades:
  enabled: false

self_optimizing_meta_engine:
  enabled: false

champion_challenger:
  enabled: false
