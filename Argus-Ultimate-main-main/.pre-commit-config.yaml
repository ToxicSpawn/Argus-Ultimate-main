repos:
  # ──────────────────────────────────────────────
  # Ruff — replaces flake8, isort, pyupgrade, and black format
  # ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ──────────────────────────────────────────────
  # Standard hygiene
  # ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-ast
      - id: debug-statements
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ──────────────────────────────────────────────
  # Bandit — security issues, medium+ severity
  # ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-ll"]
        exclude: tests/|tests_unified/|archive/|\.venv/

  # ──────────────────────────────────────────────
  # MyPy — type check core trading packages before commit
  # ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args:
          - --ignore-missing-imports
          - --no-error-summary
        files: ^(core|risk|execution|monitoring)/
        additional_dependencies:
          - types-PyYAML
          - types-python-dateutil
          - types-pytz

  # ──────────────────────────────────────────────
  # Secret detection — catch credentials before they land
  # ──────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: \.env\.example|\.env\..*template
