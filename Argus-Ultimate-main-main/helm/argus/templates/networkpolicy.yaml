{{- if .Values.networkPolicy.enabled }}
# Ingress: allow Prometheus to scrape Argus metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "argus.fullname" . }}-allow-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "argus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS (Binance API)
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
    {{- if .Values.networkPolicy.allowEgressInternet }}
    # Full egress for exchange connectivity
    - {}
    {{- end }}
{{- end }}
