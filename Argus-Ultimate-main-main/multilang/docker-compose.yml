# All 23 language services. Same image; each container runs with LANGUAGE and PORT set.
# From repo root: docker compose -f multilang/docker-compose.yml up -d
# Bot config: point multi_language.endpoints to http://argus-<lang>:<port> when bot runs in same network,
# or http://localhost:8011, http://localhost:8012, ... when bot runs on host.

services:
  argus-rust:
    build: .
    environment: { LANGUAGE: rust, PORT: "8011" }
    ports: ["8011:8011"]
  argus-cpp:
    build: .
    environment: { LANGUAGE: cpp, PORT: "8012" }
    ports: ["8012:8012"]
  argus-cuda:
