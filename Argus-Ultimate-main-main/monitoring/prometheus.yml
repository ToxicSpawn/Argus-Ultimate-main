# Argus Ultimate — Prometheus configuration
# Push 84

global:
  scrape_interval: 5s
  evaluation_interval: 10s
  scrape_timeout: 4s
  external_labels:
    system: argus-ultimate
    env: production

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 5s

# Load alert + recording rules
rule_files:
  - /etc/prometheus/alerts/argus_alerts.yml
  - /etc/prometheus/alerts/recording_rules.yml

# Scrape targets
scrape_configs:

  - job_name: argus
    static_configs:
      - targets:
          - argus-bot:8080
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 4s

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
    scrape_interval: 15s
