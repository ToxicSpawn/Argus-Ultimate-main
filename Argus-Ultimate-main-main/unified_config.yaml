# MIGRATION NOTICE:
# This file is now a legacy compatibility source.
# Live-authoritative runtime configuration must come from:
#   - config/constitution/*.yaml
#   - config/runtime/*.yaml
#   - config/exchange/*.yaml
#   - config/strategy/*.yaml
#
# Do not add new live runtime policy here.

# ARGUS ULTIMATE + KRAKEN DCA + PINNACLE AI - UNIFIED CONFIGURATION (ABSOLUTE PINNACLE)
# Run profile: 2 switches (MLAG active-active), $1,000.00 AUD starting capital
# Pinnacle = strategy_whitelist (positive-edge only) + edge-cost gate + disabled losers + regime filter
# config_version: for future config migrations (increment when breaking schema changes)
config_version: 1

# Constitution config
constitution:
  profile: "paper"
  version: "1.0.0"
  description: "Paper trading configuration - Sydney, NSW Australia"

# Timezone and location
timezone: "Australia/Sydney"
location:
  city: "Sydney"
  state: "NSW"
  country: "AU"
  timezone: "Australia/Sydney"

# ============================================================================
# RUN TEMPLATE - TARGET HARDWARE THE BOT RUNS ON (canonical spec)
# ============================================================================
# This is the hardware template the bot is configured for. All performance
# targets, GPU/CPU/RAM settings, and network topology assume this stack.
run_template:
  # Host PC
  cpu: "Intel Core Ultra 9 285K"           # Arrow Lake, 8P+16E cores
  motherboard: "Gigabyte Z890 AORUS ELITE WIFI7"
  ram: "G.Skill Trident Z5 RGB 64GB (2x32GB) PC5-51200 (6400MHz) DDR5"
  gpu: "MSI GeForce RTX 5080 16G GAMING TRIO OC"
  gpu_specs:
    boost_mhz: 2700
    memory: "16GB GDDR7 (30Gbps)"
    bus: "256-bit, PCI-E 5.0 x16"
    display: "3x DisplayPort 2.1b, 1x HDMI 2.1b"
    features: ["DLSS 4", "Metal Backplate", "Tri FROZR 4 Thermal Design"]

  # Network: 2 switches (MLAG active-active) + Solarflare XtremeScale 10GbE NIC
  switches: 2
  switch_topology: "mlag_active_active"   # 20Gbps aggregate, mission-critical redundancy
  nic: "Solarflare XtremeScale SFN8522-PLUS Dual Port 10GbE PCI-E Server Adapter FH"  # dual port; network_10gbe uses Port1/Port2

# ============================================================================
# CAPITAL SETTINGS - START WITH $1K AUD (deploy more capital per trade as balance grows)
# ============================================================================
capital:
  starting_capital_aud: 1000.0     # Start bot with 1,000 AUD (paper and live)
  currency: "AUD"
  min_position_size_aud: 15.0       # Minimum $15 to reduce fee drag on tiny trades
  max_position_size_aud: 180.0      # Per-trade cap; binding limit is max_total_exposure_pct
  max_position_pct: 0.35           # 35% max single position — room for conviction sizing
  max_total_exposure_pct: 0.95     # 95% — near full deployment (validator caps at 1.0)

  # Optional: max concurrent positions (capital optimizer uses this when set)
  max_concurrent_positions: 5      # 5 concurrent — capture more opportunities across 48 pairs

  # 10GbE Micro-Trading
  enable_micro_positions: false
  flash_position_max_aud: 0.0

# ============================================================================
# FX (AUD base capital ↔ USD quoted pairs)
# ============================================================================
fx:
  # USD per 1 AUD. Used for sizing and accounting when trading USD-quoted pairs.
  # In production you may want to replace this with a real-time FX feed.
  aud_to_usd: 0.65

# ============================================================================
# RISK MANAGEMENT - MAX EARNINGS (improved: avoid shakeouts, let winners run)
# ============================================================================
risk:
  max_daily_loss_pct: 0.25          # 25% max daily loss (paper trading)
  max_drawdown_pct: 0.10            # 10% max drawdown — tighter protection
  stop_loss_pct: 0.012             # 1.2% stop — tighter for better R:R
  take_profit_pct: 0.035            # 3.5% take profit — R:R = 2.92:1 (need only 45% win rate)
  max_consecutive_losses: 20        # 20 consecutive losses before tightening
  max_error_rate: 0.25              # 25% error rate triggers shutdown (was 5% — too sensitive)

  # 10GbE Speed Optimizations (DEPRECATED — not yet implemented in trading loop)
  enable_latency_based_stops: false  # NOT IMPLEMENTED — placeholder for future latency-aware stops
  position_scaling_speed: "fast"     # Faster position adjustments
  enable_dynamic_sizing: false       # NOT IMPLEMENTED — placeholder for future latency-aware sizing

  # Position sizing (replaces placeholders above — now ACTUALLY IMPLEMENTED)
  position_sizing:
    # Method: fixed | atr_based | kelly | risk_parity (falls back to fixed if unavailable)
    method: "atr_based"

    # ATR-based sizing: position = (risk_amount) / (atr_multiplier * atr)
    # atr_multiplier acts as stop-loss buffer in ATR units
    atr_multiplier: 2.0                    # 2x ATR stop distance (more stable than fixed %)
    atr_period: 14                         # ATR lookback period (standard: 14)
    atr_lookback_type: "ema"               # ema | sma — smoother signals use EMA
    use_adaptive_atr: true                  # Scale ATR multiplier based on volatility regime
    atr_vol_scale_floor: 1.5                # Min ATR mult in high vol (was 2.0)
    atr_vol_scale_ceiling: 3.0              # Max ATR mult in low vol (was 3.0)

    # Kelly Criterion sizing (when method=kelly)
    kelly_fraction: 0.25                    # Fraction of full Kelly (half-Kelly = 0.5; 0.25 for crypto)
    kelly_min_trades: 20                    # Min trades before computing Kelly (avoid early overfitting)
    kelly_max_position_pct: 0.25           # Cap Kelly-derived position at 25% of capital
    kelly_bootstrap_samples: 1000           # Bootstrap samples for Kelly confidence
    kelly_confidence_level: 0.90            # Use lower-confidence Kelly if True
    kelly_use_ema: true                     # Use EMA of win rate for more stable Kelly

    # Volatility cone: scale positions based on current vol vs historical range
    use_volatility_cone: true
    vol_cone_window: 252                    # Annualized vol lookback (252 trading days)
    vol_cone_high_pct: 0.90                 # Scale DOWN when vol > 90th percentile of history
    vol_cone_low_pct: 0.10                   # Scale UP when vol < 10th percentile of history
    vol_cone_high_scale: 0.5                 # Reduce size by 50% at high vol
    vol_cone_low_scale: 1.5                 # Increase size by 50% at low vol
    vol_cone_min_scale: 0.3                 # Never go below 30% of base size
    vol_cone_max_scale: 2.0                 # Never exceed 200% of base size

    # Correlation-aware sizing: reduce combined size when positions are correlated (e.g. BTC/ETH)
    use_correlation_aware_sizing: true      # Correlation matrix fed from quant_fund each cycle; benefits multi-position risk
    max_correlated_exposure: 0.6            # Scale down smaller weight when correlation > this (0.6 = 60%)

  # Entry thresholds: multi-factor scoring with momentum, volume, regime confirmation
  entry_thresholds:
    # Multi-factor scoring: trade requires MIN_SCORE across all factors
    min_entry_score: 0.60                   # Weighted score across factors must exceed this (0-1)
    use_multi_factor_scoring: true

    # Factor 1: Signal confidence (from strategy)
    confidence_weight: 0.30
    min_confidence: 0.25                    # Minimum confidence from signal source

    # Factor 2: Trend/momentum confirmation
    momentum_weight: 0.25
    require_momentum_confirmation: true    # Price should be moving in signal direction
    momentum_lookback_bars: 5               # Bars to check for momentum
    momentum_min_strength_pct: 0.30         # Min momentum score (0.3 = 30% of bar direction)

    # Factor 3: Volume confirmation
    volume_weight: 0.20
    require_volume_confirmation: true      # Volume should support the move
    volume_lookback_bars: 5
    volume_min_ratio: 1.2                   # Current vol / avg vol must exceed this

    # Factor 4: Edge-cost gate
    edge_weight: 0.25
    edge_gate_min_edge_pct: 0.50            # Min edge after fees/slippage (paper)
    edge_gate_live_edge_pct: 0.65           # Stricter in live

    # Factor 5: Regime alignment
    regime_weight: 0.15
    require_regime_alignment: true          # Strategy must be favored in current regime
    regime_confidence_min: 0.55            # Min regime detector confidence

    # Factor 6: Time-of-day filter
    time_weight: 0.10
    skip_off_hours: true                    # Reduce exposure outside high-liquidity hours
    off_hours_pct: 0.50                    # Scale positions to 50% during off-hours
    off_hours_start_utc: 2                 # Start of off-hours (UTC)
    off_hours_end_utc: 8                   # End of off-hours (UTC)

    # Factor 7: Spread/slippage filter
    spread_weight: 0.10
    max_entry_spread_bps: 15.0              # Reject if bid-ask spread > 15 bps
    max_entry_slippage_pct: 0.003          # Reject if expected slippage > 0.3%

  # Risk limits: risk-of-ruin, drawdown scaling, streak escalation, PnL circuits
  risk_limits:
    # Drawdown-based position scaling (reduce size as drawdown increases)
    use_drawdown_scaling: true
    dd_scale_floor: 0.30                    # Never go below 30% of base position
    dd_scale_ceiling: 0.10                  # Start reducing at 10% drawdown
    dd_scale_curve: "linear"                # linear | exponential — how aggressively to scale

    # Risk-of-ruin limits
    risk_of_ruin_limit: 0.02               # Max 2% chance of losing 50% of capital
    ruin_lookback_trades: 100               # Trades to use for ruin estimate
    ruin_simulations: 10000                # Monte Carlo paths for ruin estimate

    # Exposure caps (separate from position size)
    max_daily_new_exposure_pct: 0.50       # Limit new risk added per day (50% of capital)
    max_weekly_new_exposure_pct: 1.50     # Limit new risk per week (150% of capital)
    exposure_cool_off_minutes: 30          # After hitting daily cap, wait before adding risk

    # PnL-based circuit breakers (dynamic limits based on recent performance)
    use_pnl_circuit_breakers: true
    pnl_circuit_max_loss_pct: 0.20          # Stop adding risk if down 20% in period
    pnl_circuit_profit_resume_pct: 0.05   # Resume after making back 5% from trough
    pnl_circuit_period_bars: 100           # Period for PnL circuit (bars)

    # Streak-based risk escalation
    use_streak_escalation: true
    streak_escalation_loss_threshold: 3    # Start escalating at 3 consecutive losses
    streak_escalation_max_factor: 0.25    # Max reduction: never exceed 25% of base (more conservative)

    # ============================================================================
# ADAPTIVE CONFIG ENGINE - SELF-TUNING PARAMETERS
# ============================================================================
# Parameters self-adjust based on live feedback. Adaptation happens within
# configured bounds so the system never goes off-rails.
# ============================================================================
adaptive_config:
  enabled: true
  modes: ["paper", "backtest", "live"]

  # Adaptation speed: how fast parameters change (lower = smoother, higher = faster)
  adaptation_rate: 0.05                  # 5% per update (slow, safe)
  min_adaptation_interval_cycles: 10     # Min cycles between adaptations
  max_adaptation_interval_cycles: 100    # Max cycles (prevents too-fast changes)

  # What to adapt
  adapt_entry_thresholds: true
  adapt_position_sizing: true
  adapt_risk_limits: true

  # Adaptation strategy: exponential_moving_average | gradient_descent | bayesian
  adaptation_strategy: "exponential_moving_average"

  # Bounds checking: never adapt outside these limits
  bounds:
    min_entry_score: 0.40
    max_entry_score: 0.85
    min_confidence: 0.15
    max_confidence: 0.75
    min_position_fraction: 0.05
    max_position_fraction: 0.40
    min_atr_multiplier: 1.5
    max_atr_multiplier: 4.0
    min_drawdown_limit: 0.05
    max_drawdown_limit: 0.20
    min_stop_loss: 0.008
    max_stop_loss: 0.025

  # Feedback signals used for adaptation
  feedback_signals:
    use_sharne: true                     # Adapt based on Sharpe ratio trend
    use_win_rate: true                   # Adapt based on win rate
    use_expectancy: true                 # Adapt based on expectancy
    use_drawdown: true                   # Adapt based on current drawdown
    use_regime: true                     # Adapt faster in stable regimes
    use_correlation: false               # Adapt based on position correlation

  # Performance gating: only adapt when signal is strong enough
  min_feedback_samples: 30               # Min trades before adapting a parameter
  adaptation_threshold: 0.10             # Parameter must change outcome by 10% to trigger adaptation
  confidence_threshold: 0.80             # Only adapt when 80%+ confident

  # Adaptation history: remember successful adaptations for similar conditions
  use_adaptation_memory: true
  adaptation_memory_size: 100            # Remember last 100 successful adaptations
  similarity_threshold: 0.70             # Apply remembered adaptation when conditions are 70%+ similar

  # Learning rate decay: slow down adaptation as system matures
  use_learning_rate_decay: true
  initial_learning_rate: 0.10            # Start aggressive
  final_learning_rate: 0.02              # End conservative
  decay_period_trades: 500               # Decay over 500 trades

  # Regime-aware adaptation: adapt faster in trending, slower in ranging
  regime_adaptation_multipliers:
    trending_up: 1.5                     # Adapt 50% faster in uptrend
    trending_down: 1.2                   # Adapt 20% faster in downtrend
    ranging: 0.5                         # Adapt 50% slower in range
    high_volatility: 0.7                 # Adapt 30% slower in high vol

  # Streak-aware: tighten parameters during losing streaks
  streak_response:
    enabled: true
    loss_streak_threshold: 3             # Start responding at 3 losses
    loss_streak_shrink_rate: 0.15         # Shrink positions by 15% per loss streak
    win_streak_threshold: 5              # Start expanding at 5 wins
    win_streak_growth_rate: 0.10          # Grow positions by 10% per win streak
    max_streak_adjustment: 0.5           # Never adjust more than 50%

  # Equity-sensitive: reduce risk as equity grows (protect profits)
  equity_scaling:
    enabled: true
    scale_up_threshold: 1.20             # Start scaling up when equity > 120% of start
    scale_up_factor: 1.10               # Scale positions by 1.1x at threshold
    scale_down_threshold: 0.85            # Start scaling down when equity < 85% of start
    scale_down_factor: 0.85              # Scale positions by 0.85x below threshold
    max_scale_factor: 1.50               # Never scale above 1.5x
    min_scale_factor: 0.50               # Never scale below 0.5x

  # Volatility-aware: tighten in high vol, loosen in low vol
  volatility_adaptation:
    enabled: true
    vol_lookback: 20                      # Recent volatility window
    vol_high_threshold: 0.03             # 3% daily vol = high
    vol_low_threshold: 0.01             # 1% daily vol = low
    high_vol_shrink: 0.75                # Shrink positions 25% in high vol
    low_vol_grow: 1.25                  # Grow positions 25% in low vol
    use_volatility_cone: true            # Use cone vs history for scaling

  # Drawdown recovery: gradually restore risk after drawdown
  recovery_mode:
    enabled: true
    recovery_start_dd: 0.05              # Start recovery after 5% drawdown
    recovery_end_dd: 0.02                # Full risk restored at 2% drawdown
    recovery_rate: 0.10                  # Restore 10% of lost risk per winning trade
    max_recovery_fraction: 0.50          # Never recover more than 50% of original risk

  # Adaptation persistence: save learned parameters for next session
  persist_adaptations: true
  adaptation_db_path: "data/adaptations.db"
  adaptation_backup_interval_cycles: 100  # Backup every 100 cycles

  # Emergency override: lock parameters during extreme events
  emergency_lock:
    enabled: true
    lock_on_max_drawdown: true           # Stop adapting when near max drawdown
    lock_on_consecutive_losses: 5        # Stop adapting during losing streak
    lock_on_high_vol: true              # Stop adapting during vol spike
    lock_duration_cycles: 20            # Lock for 20 cycles after event
  portfolio_var_limit_pct: 0.10            # block new risk when 95% VaR >= 10% of capital (minimum allowed by config validator)
  portfolio_cvar_limit_pct: 0.08           # block new risk when CVaR (99%) >= 8% of capital
  portfolio_var_confidence: 0.95
  portfolio_var_lookback_trades: 50
  cluster_drawdown_brake_pct: 0.0          # 0 disables; blocks new risk when cluster drawdown exceeds limit
  target_cluster_cap_pct: 0.40             # cluster risk budget as fraction of equity
  risk_cluster_map: {}                     # optional map, e.g. {"BTC/USD":"majors","SOL/USD":"alts"}
  portfolio_vol_target_pct: 2.0            # realized vol target used for exposure scaling
  portfolio_liquidity_spread_ref_bps: 20.0 # spread reference for liquidity scaling
  portfolio_exposure_min_scale: 0.30       # floor scale so cap never collapses to zero

  # Circuit breaker & auto-reduce (live + paper): trip on drawdown; reduce size after N losses
  circuit_breaker_dd_pct: 8.0             # Trip circuit breaker when drawdown >= 8%
  var_breach_pct: 5.0                      # VaR breach threshold (pct) for circuit breaker
  var_breach_alert_enabled: true           # Emit rec_event(stage=var_breach_alert) when VaR breach
  auto_reduce_after_n_losses: 3            # After N consecutive losses, reduce position size
  auto_reduce_factor: 0.6                  # Size multiplier when auto-reduce active (0.6 = 60%)

  # Emergency shutdown: extra conditions (doc §8: use all risk levers)
  emergency_shutdown:
    enabled: true
    latency_spike_ms: 600000   # trip if cycle took > 600s (10 min — 48 pairs need time for OHLCV cache warmup)
    flash_crash_pct: 15.0      # trip if any symbol moved > 15% in one cycle
    network_fail: true         # trip when exchange unreachable (set by data layer)
    arb_spread_bps: 500        # trip if spread > 500 bps (optional)

# Runtime safety controls for soak stability.
runtime_safety:
  latency_grace_cycles: 2
  live_safe_disable_pinnacle_ai_brain: false

  # Canonical market-data polling controls.
  market_data:
    ohlcv_cache_seconds: 120
    ohlcv_poll_interval_seconds: 60
  ohlcv_retry_attempts: 2
  # Historical OHLCV pre-loading for evolver/scanner
  enable_historical_preload: true
  historical_lookback_hours: 4380     # 6 months of hourly candles
  historical_timeframe: "1h"
  historical_cache_dir: "data/historical"

# ============================================================================
# EXCHANGE SETTINGS
# ============================================================================
exchanges:
  primary: "binance"
  secondary: "kraken"
  use_ccxt: true              # Use CCXT for primary exchange (data/ccxt_data_provider); market data + execution via ccxt)
  supported:
    - "binance"
    - "kraken"
    - "mexc"
  
  kraken:
    maker_fee: 0.0016                # 0.16%
    taker_fee: 0.0026                # 0.26%
    min_order_size: 0.0001
  
  coinbase_advanced:
    # Coinbase Advanced Trade (conservative default tier assumption)
    maker_fee: 0.006                 # 0.60%
    taker_fee: 0.008                 # 0.80%
    min_order_size: 1.0              # USD

  mexc:
    # MEXC - Lowest fees in the market (0% maker, 0.01% taker)
    # No direct AUD deposit - transfer crypto from Kraken
    maker_fee: 0.0                   # 0% maker fee!
    taker_fee: 0.0001                # 0.01% taker fee
    min_order_size: 5.0              # USD
    api_key_env: "MEXC_API_KEY"
    api_secret_env: "MEXC_API_SECRET"
    base_url: "https://api.mexc.com"
    websocket_url: "wss://wbs.mexc.com/ws"
    notes: "Transfer BTC/ETH from Kraken to MEXC for zero-fee trading"

# ============================================================================
# TRADING PAIRS (full universe – scanner constantly picks the best to trade)
# ============================================================================
# Best symbols for live and paper: highest liquidity = tightest spreads, least slippage.
# Used for both live trading and paper trading (single trading_pairs list).
  best_symbols:
    # Core high-conviction pairs
    - "BTC/USD"
    - "ETH/USD"
    - "SOL/USD"
    # Mid-cap with good volatility
    - "XRP/USD"
    - "DOGE/USD"
    - "LINK/USD"
    - "ARB/USD"
    - "MATIC/USD"
    # AUD pairs (home currency)
    - "BTC/AUD"
    - "ETH/AUD"

# Live and paper trading both use this list (same universe).
  trading_pairs:
    # ── Core (high conviction, tight spreads) ──
    - "BTC/USDT"
    - "ETH/USDT"
    # ── Mid-cap L1s (good volatility for small accounts) ──
    - "SOL/USDT"
    - "XRP/USDT"
    - "DOGE/USDT"
    - "ADA/USDT"

# ============================================================================
# COMMISSION & SLIPPAGE
# ============================================================================
execution:
  slippage_pct: 0.0015               # Tighter slippage assumption (improved execution)
  commission_reserve_pct: 0.05       # Reserve 5% for fees
  signal_cooldown_bars: 4            # Min bars between trades (4 = balance quality vs frequency)

# ============================================================================
# EXECUTION ROUTING (SmartOrderRouter weights — tune venue scoring)
# ============================================================================
execution_routing:
  enabled: true
  weights:
    liquidity: 0.40                    # Venue liquidity score weight
    latency: 0.20                      # Lower latency = higher score
    fees: 0.20                         # Lower fees = higher score
    reliability: 0.20                  # Venue uptime / reliability weight
  max_venues: 3                        # Max venues to split an order across

# ============================================================================
# CONTINUOUS BEST-TRADE SCANNER (peak mode: parallel, liquidity, diversity)
# ============================================================================
continuous_scan:
  enabled: true
  interval_seconds: 10.0       # Base rescan interval (5–60s)
  top_n: 4                       # Concentrate on 4 best (doc §2: match allocator max_total_signals)
  use_cached_best: true         # Main loop uses scanner's best list when fresh
  max_age_seconds: 30.0         # Cache considered stale after this; fallback to AI brain
  # Peak mode (scanner at its best)
  parallel_sources: true       # Gather AI brain + strategy engine + HFT in parallel
  use_liquidity_boost: true     # Boost score for tighter order book spread
  liquidity_spread_pct_cap: 0.05  # Spreads tighter than this get max liquidity bonus
  diversity_max_per_symbol: 2   # Max opportunities per symbol in top N (avoid all one pair)
  diversity_max_per_strategy: 2 # Max per strategy (avoid all one strategy)
  adaptive_interval_enabled: true  # Shorten interval when opportunities found, lengthen when empty
  min_interval_seconds: 5.0     # Fastest rescan (peak responsiveness)
  max_interval_seconds: 30.0    # Slowest when cache empty
  max_symbols_per_scan: 25      # Pairs per scan (rotates through full list so all get scanned)
  # Multi-timeframe: primary TF (e.g. 1h) for trend, entry TF (e.g. 15m) for entries; keep only when both agree (best way: fewer, better signals)
  signal_multi_timeframe_enabled: false  # Disabled — adds latency, kills 20-30% of valid reversals at $1K scale
  signal_primary_timeframe: "1h"
  signal_entry_timeframe: "15m"
  # External alpha: set to true and set URL when you have a signal API (best way #11)
  external_alpha_enabled: false
  external_alpha_url: ""
  external_alpha_timeout_seconds: 5.0
  # Strategy plugins: list of module paths providing get_strategies(config) -> {name: strategy}
  strategy_plugin_modules: []
  # Optional module: universe_builder – refresh trading_pairs by real volume (CCXT) every N cycles
  dynamic_universe_enabled: false
  dynamic_universe_interval_cycles: 100  # Refresh every 100 cycles (~17 min at 10s interval)
  dynamic_universe_top_n: 15

# ============================================================================
# LIQUIDITY SCANNER (scan exchange for best liquidity, rank pairs)
# ============================================================================
  liquidity_scanner:
    enabled: false
    exchange_id: "kraken"
    quote_currencies: ["USD"]
    max_pairs: 5               # Return top 5 by liquidity score
  min_volume_usd: 50000       # Skip pairs with <$50K daily volume
  depth_levels: 10             # Order book depth levels to analyze
  scan_interval_cycles: 50     # Re-scan every 50 cycles (~8 min at 10s interval)
  batch_size: 5                # Fetch order books in batches of 5
  batch_delay_s: 1.0           # Delay between batches (rate limiting)
  cache_ttl_s: 60.0            # Cache results for 60s
  auto_update_pairs: false      # Automatically update trading_pairs with top results
  # Score weights (must sum to 1.0)
  w_volume: 0.40               # 24h volume weight
  w_spread: 0.30               # Bid-ask spread weight
  w_depth: 0.20                # Order book depth weight
  w_imbalance: 0.10            # Flow imbalance weight (balanced = better)

# ============================================================================
# EDGE-COST GATE (only trade when expected edge clearly exceeds costs)
# Profitability: strict gate = fewer trades, higher expected edge per trade.
# ============================================================================
edge_cost_gate:
  enabled: true
  modes: ["paper", "backtest", "live"]   # live: gate applies in production (strict entry)
  min_edge_pct: 0.50                # Relaxed from 0.85% — backtest showed signals are profitable at lower edge
  buffer_mult: 1.5                  # Edge must exceed cost by 1.5x (was 2x; still filters negative-edge)
  live_min_edge_pct: 0.65           # In live: require 0.65% min edge (was 1.0%)
  live_buffer_mult: 1.8             # In live: edge must exceed cost by 1.8x (was 2.2x)
  fee_mult: 2.0
  slippage_mult: 2.0

# ============================================================================
# PORTFOLIO TARGET ENGINE (v1)
# Signals -> targets -> execution deltas
# ============================================================================
portfolio_target_engine:
  enabled: true
  convergence_alpha: 1.0
  rebalance_min_delta_pct: 0.02
  score_confidence_weight: 1.0
  score_net_edge_weight: 1.0
  regime_boost_enabled: true

# ============================================================================
# LIQUIDITY-AWARE RISK ENGINE v1 (targets -> liquidity clamps -> risk gate)
# ============================================================================
liquidity_risk_engine:
  enabled: true
  depth_fraction_limit: 0.04
  thin_spread_threshold_bps: 6
  danger_spread_threshold_bps: 12
  min_depth_threshold: 0.5
  slippage_threshold_bps: 10
  min_liquidity_score: 0.2
  # When no L2 orderbook data (bid/ask/depth all zero) and spread is below
  # thin threshold, assume normal liquidity instead of blocking trades.
  # Essential for paper trading where L2 feeds may not be wired.
  assume_normal_without_l2: true
  score_weights:
    depth: 1.0
    spread: 1.0
    fill_ratio: 0.75

# ============================================================================
# EXECUTION ALPHA ENGINE v2 (targets -> execution plans -> intents)
# ============================================================================
execution_alpha_engine:
  enabled: true
  maker_spread_threshold_bps: 2
  min_fill_probability: 0.35
  slice_threshold_pct: 0.03
  maker_fallback_seconds: 8
  telemetry_window: 200

# ============================================================================
# STRATEGY EVALUATION ENGINE v1 (evaluation only, no auto-promotion/disable)
# ============================================================================
strategy_evaluation_engine:
  enabled: true
  persist_interval_cycles: 10
  min_trades_for_ranking: 5
  use_regime_scoped_metrics: true
  sharpe_like_min_trades: 5
  max_metrics_history_points: 500
  halt_on_error: false
  db_path: "data/strategy_metrics.db"

# ============================================================================
# SELF-OPTIMIZING META ENGINE v1 (deterministic strategy weighting)
# ============================================================================
self_optimizing_meta_engine:
  enabled: true
  advisory_only: false
  update_interval_cycles: 10
  min_trades_for_reweighting: 5
  meta_alpha: 0.2
  max_weight_change_per_update: 0.10
  min_weight_per_strategy: 0.05
  max_weight_per_strategy: 0.45
  baseline_weight_mode: "equal"
  db_path: "data/meta_weights.db"
  score_weights:
    expectancy: 1.0
    sharpe_like: 1.0
    profit_factor: 0.75
    drawdown_penalty: 1.0
    fee_penalty: 0.5
    slippage_penalty: 0.5
  regime_multipliers:
    trend:
      momentum: 1.15
      breakout: 1.10
    range:
      mean_reversion: 1.15

# ============================================================================
# CHAMPION / CHALLENGER PROMOTION ENGINE v1 (advisory-first, no auto-promotion)
# ============================================================================
champion_challenger:
  enabled: true
  advisory_only: true
  min_trades_for_promotion: 10
  max_drawdown_pct_for_promotion: 0.12
  require_expectancy_improvement: true
  require_profit_factor_improvement: false
  require_sharpe_like_improvement: true
  persist_interval_cycles: 10
  db_path: "data/champion_challenger.db"
  artifacts_dir: "deploy/promotions"
  promotion_weights:
    net_pnl: 1.0
    expectancy: 1.0
    profit_factor: 0.75
    sharpe_like: 1.0
    drawdown_penalty: 1.25
    fee_penalty: 0.5

# ============================================================================
# MARKET MICROSTRUCTURE ENGINE v1
# ============================================================================
market_microstructure_engine:
  enabled: true
  rolling_window: 20
  vacuum_spread_jump_bps: 4
  vacuum_depth_drop_ratio: 0.5
  high_adverse_selection_threshold: 0.7
  use_in_execution_alpha: true
  use_in_liquidity_risk: true

# ============================================================================
# RECON-REQUIRED RECOVERY ENGINE v1
# ============================================================================
recon_recovery_engine:
  enabled: true
  stale_threshold_seconds: 60
  base_retry_delay_seconds: 5
  max_retries: 5
  halt_on_retry_exhausted: true

# ============================================================================
# SYSTEM HEALTH METRICS (runtime health snapshots)
# ============================================================================
system_health_metrics:
  enabled: true
  snapshot_interval_cycles: 10

# ============================================================================
# AI BRAIN SETTINGS (PINNACLE AI) - MAX EARNINGS AT $1K
# ============================================================================
ai_brain:
  enabled: true
  consciousness_enabled: true
  swarm_intelligence_enabled: true
  num_ai_agents: 80                 # Slightly more agents for better signal diversity
  # Profitability: higher bar = only high-conviction trades (fewer but better)
  min_signal_confidence: 0.10       # Lowered for more trades (was 0.35)
  live_min_signal_confidence: 0.25  # Live stays conservative (was 0.55)
  max_concurrent_signals: 8          # Up to 8 signals across all symbols
  # Strategy engine RSI/BB thresholds (relaxed for paper learning)
  se_buy_rsi: 50                     # Buy when RSI < 50 (was 42 - more signals)
  se_sell_rsi: 50                    # Sell when RSI > 50 (was 58 - more signals)
  se_buy_bb: 0.45                    # Buy when BB position < 0.45 (was 0.35)
  se_sell_bb: 0.55                   # Sell when BB position > 0.55 (was 0.65)
  # Drawdown-adaptive confidence (Phase 3): threshold auto-adjusts based on current drawdown
  dd_adaptive_confidence_enabled: false
  dd_adaptive_conf_floor: 0.30      # Threshold when drawdown = 0% (most aggressive)
  dd_adaptive_conf_ceiling: 0.85    # Threshold when drawdown = max_drawdown_pct (most conservative)

  # 10GbE Speed Enhancements
  enable_arbitrage_boost: true       # Leverage speed for arbitrage detection
  enable_flash_signals: true         # Microsecond opportunity detection
  latency_optimization: true         # Optimize for <1μs network latency

  agents:
    market_analyst: true
    risk_manager: true
    execution_specialist: true
    sentiment_analyst: true
    arbitrage_detector: true
    regime_detector: true
    momentum_trader: true
    mean_reversion_trader: true

  consciousness:
    market_sentiment_weight: 0.25
    fear_greed_weight: 0.15
    pattern_recognition_weight: 0.30
    intuition_weight: 0.30

  quantum_optimization:
    enabled: true
    method: "quantum_approximate"
    risk_parity: true

# ============================================================================
# STRATEGY PACK (optional additional strategies)
# ============================================================================
# PINNACLE: positive-edge only. Scanner + main loop enforce whitelist when non-empty.
strategies:
  enabled:
    - "hunter"
    - "shadow"
    - "momentum"
    - "mean_reversion"
    - "trend_following"
    - "quantum_momentum_elite"
    - "quantum_mean_reversion_elite"
    - "quantum_trend_following_elite"
  max_extra_signals: 2
  # Only these strategies may emit signals
  strategy_whitelist: ["mean_reversion", "momentum", "funding_rate_harvester", "regime_aligned", "macd_trend"]
  use_regime_lstm_boost: true        # When true, scale signal confidence by ml.regime_boost (Priority 2 recommended)
  use_volatility_regime_scale: true  # Scale down confidence in high vol (doc §6: regime/vol-aware)
  volatility_regime_high_threshold: 0.02
  use_funding_rate_filter: true      # Skip long when funding rate >= threshold (doc §6: avoid expensive longs)
  # funding_rates_url: ""            # Optional: HTTP URL for funding rates JSON; else CCXT
  funding_rate_skip_long_threshold: 0.0001  # 0.01% = skip long when rate >= this
  # Regime-based filter: momentum in trending, mean-reversion in ranging
  regime_filter_enabled: true
  regime_filter_trend_strategies: ["momentum"]
  regime_filter_mr_strategies: ["mean_reversion"]
