# Argus Kustomize root — Push 64
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argus-system

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/name: argus-ultimate
  app.kubernetes.io/version: "8.0.0"
  app.kubernetes.io/managed-by: kustomize
