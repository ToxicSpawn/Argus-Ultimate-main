# =============================================================================
# ARGUS Capital Tier: MICRO ($0 - $5,000)
# =============================================================================
# Conservative single-venue config. Goal: don't blow up while learning.
# Auto-applied by CapitalTierManager when portfolio is in this range.
# =============================================================================

tier:
  name: micro
  min_aud: 0
  max_aud: 5000
  description: "Conservative single-venue config for $0-$5k"

# Position sizing
max_position_pct: 0.30
min_position_size_aud: 10.0
max_concurrent_positions: 5
max_pyramids_per_position: 1

# Risk
daily_loss_limit_pct: 0.08
portfolio_var_limit_pct: 0.05
portfolio_cvar_limit_pct: 0.07
circuit_breaker_enabled: true

# Stops / TPs
stop_loss_pct: 0.012
take_profit_pct: 0.035
trailing_stop_enabled: false

# Venues
primary_exchange: kraken
enabled_venues:
  - kraken

# Strategies enabled at this tier
enabled_strategies:
  - momentum
  - mean_reversion
  - breakout
  - funding_rate_harvester
  - bb_squeeze

# Trading universe (focused — not 48 pairs at $1k)
trading_pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - LINK/USD
  - AVAX/USD
  - MATIC/USD
  - DOT/USD
  - ADA/USD

# Execution
maker_enforcement: true  # save fees at small capital
intelligent_executor: true
algo_execution: false  # not needed at small capital

# Meta
confidence_threshold: 0.55
cycle_seconds: 15
