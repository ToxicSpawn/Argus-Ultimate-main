[mypy]
# Global: lenient on legacy code, strict on new modules
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
no_implicit_optional = True
strict_optional = True

# Strict zone: core/ and risk/ must be fully annotated
[mypy-core.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True
check_untyped_defs = True

[mypy-risk.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True

[mypy-utils.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Lenient zone: legacy monolith files
[mypy-unified_trading_system]
ignore_errors = True

[mypy-unified_execution_engine]
ignore_errors = True

[mypy-unified_language_orchestrator]
ignore_errors = True

[mypy-main]
ignore_errors = True

[mypy-run_godmode]
ignore_errors = True

[mypy-run_peak]
ignore_errors = True

[mypy-run_ultimate]
ignore_errors = True

# Third-party stubs
[mypy-ccxt.*]
ignore_missing_imports = True

[mypy-qiskit.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True
