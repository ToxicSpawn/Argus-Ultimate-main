# Push 73 — Prometheus scrape configuration for Argus Ultimate
# Global settings
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    monitor: 'argus-ultimate'
    environment: 'production'

# Alertmanager (optional — configure if using)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Alerting rules
rule_files:
  - /etc/prometheus/alerting_rules.yml

# -----------------------------------------------------------------------
# Scrape configs
# -----------------------------------------------------------------------
scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

  # Argus trading bot metrics
  - job_name: argus
    scrape_interval: 5s          # higher frequency for trading metrics
    metrics_path: /metrics
    static_configs:
      - targets: ['argus:8000']
        labels:
          service: argus
          component: trading_bot
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Node exporter (host metrics)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: node_exporter

  # cAdvisor (container metrics)
  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: cadvisor
    metric_relabel_configs:
      # Drop high-cardinality container metrics we don't need
      - source_labels: [__name__]
        regex: 'container_(network_tcp_usage_total|tasks_state|cpu_load_average_10s)'
        action: drop

  # Redis exporter (if deployed)
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis

  # Postgres exporter (if deployed)
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres
