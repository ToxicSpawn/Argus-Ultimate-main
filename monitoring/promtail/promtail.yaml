# Promtail config — Argus log shipping to Loki
# Push 99 — RegimeGrafana
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: argus
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    external_labels:
      env: production
      service: argus

scrape_configs:
  # ─── Main application logs ───────────────────────────────────────────────────
  - job_name: argus
    static_configs:
      - targets:
          - localhost
        labels:
          job: argus
          __path__: /app/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level:    level
            msg:      msg
            regime:   regime
            strategy: strategy
            symbol:   symbol
            ts:       ts
      - labels:
          level:    ""
          regime:   ""
          strategy: ""
          symbol:   ""
      - timestamp:
          source: ts
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.000Z"
      - match:
          selector: '{job="argus"} |= "regime"'
          stages:
            - labels:
                regime: ""
      - match:
          selector: '{job="argus"} |= "ERROR"'
          stages:
            - metrics:
                argus_log_errors_total:
                  type: Counter
                  description: "Total error log lines from Argus"
                  source: level
                  config:
                    action: inc

  # ─── HFT engine logs ─────────────────────────────────────────────────────────
  - job_name: argus-hft
    static_configs:
      - targets:
          - localhost
        labels:
          job: argus-hft
          __path__: /app/logs/hft*.log
    pipeline_stages:
      - json:
          expressions:
            level:   level
            latency: latency_us
            venue:   venue
            ts:      ts
      - labels:
          level:  ""
          venue:  ""
      - timestamp:
          source: ts
          format: RFC3339Nano
      - match:
          selector: '{job="argus-hft"} |= "latency_budget_breach"'
          stages:
            - metrics:
                argus_hft_latency_breaches_total:
                  type: Counter
                  description: "HFT latency budget breach log events"
                  source: venue
                  config:
                    action: inc

  # ─── Docker container stdout/stderr ──────────────────────────────────────────
  - job_name: argus-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values:
              - "com.argus.service"
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_argus_service]
        target_label: argus_service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg:   msg
      - labels:
          level: ""
      - output:
          source: msg
