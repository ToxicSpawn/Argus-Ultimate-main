# ARGUS ULTIMATE + KRAKEN DCA + PINNACLE AI - UNIFIED CONFIGURATION (ABSOLUTE PINNACLE)
# Run profile: 2 switches (MLAG active-active), $1,000.00 AUD starting capital
# Pinnacle = strategy_whitelist (positive-edge only) + edge-cost gate + disabled losers + regime filter
# config_version: for future config migrations (increment when breaking schema changes)
config_version: 1

# ============================================================================
# RUN TEMPLATE - TARGET HARDWARE THE BOT RUNS ON (canonical spec)
# ============================================================================
# This is the hardware template the bot is configured for. All performance
# targets, GPU/CPU/RAM settings, and network topology assume this stack.
run_template:
  # Host PC
  cpu: "Intel Core Ultra 9 285K"           # Arrow Lake, 8P+16E cores
  motherboard: "Gigabyte Z890 AORUS ELITE WIFI7"
  ram: "G.Skill Trident Z5 RGB 64GB (2x32GB) PC5-51200 (6400MHz) DDR5"
  gpu: "MSI GeForce RTX 5080 16G GAMING TRIO OC"
  gpu_specs:
    boost_mhz: 2700
    memory: "16GB GDDR7 (30Gbps)"
    bus: "256-bit, PCI-E 5.0 x16"
    display: "3x DisplayPort 2.1b, 1x HDMI 2.1b"
    features: ["DLSS 4", "Metal Backplate", "Tri FROZR 4 Thermal Design"]

  # Network: 2 switches (MLAG active-active) + Solarflare XtremeScale 10GbE NIC
  switches: 2
  switch_topology: "mlag_active_active"   # 20Gbps aggregate, mission-critical redundancy
  nic: "Solarflare XtremeScale SFN8522-PLUS Dual Port 10GbE PCI-E Server Adapter FH"  # dual port; network_10gbe uses Port1/Port2

# ============================================================================
# CAPITAL SETTINGS - START WITH $1K AUD (deploy more capital per trade as balance grows)
# ============================================================================
capital:
  starting_capital_aud: 1000.0     # Start bot with 1,000 AUD (paper and live)
  currency: "AUD"
  min_position_size_aud: 15.0       # Minimum $15 to reduce fee drag on tiny trades
  max_position_size_aud: 180.0      # Ω safer default (was 300)      # Up to $300 per trade (~30%) — sweep showed best risk-adjusted return
  max_position_pct: 0.18           # Ω safer default (was 0.30)           # 30% max per position (was 10%; 4.59% DD vs 12% limit = safe)
  max_total_exposure_pct: 0.50     # Ω safer default (was 0.65)     # Deploy up to 65% of capital (was 40%; utilize idle capital)

  # Optional: max concurrent positions (capital optimizer uses this when set)
  max_concurrent_positions: 5      # Match 5 traded symbols (was 4)

  # 10GbE Micro-Trading
  enable_micro_positions: false
  flash_position_max_aud: 0.0

# ============================================================================
# FX (AUD base capital ↔ USD quoted pairs)
# ============================================================================
fx:
  # USD per 1 AUD. Used for sizing and accounting when trading USD-quoted pairs.
  # In production you may want to replace this with a real-time FX feed.
  aud_to_usd: 0.65

# ============================================================================
# RISK MANAGEMENT - MAX EARNINGS (improved: avoid shakeouts, let winners run)
# ============================================================================
risk:
  max_daily_loss_pct: 0.02          # 2% max daily loss
  max_drawdown_pct: 0.12            # 12% max drawdown
  stop_loss_pct: 0.015             # 1.5% stop – avoid noise shakeouts
  take_profit_pct: 0.06             # 6% take profit – R:R 4:1 (let winners run)
  max_consecutive_losses: 2         # 2 max consecutive losses then tighten
  max_error_rate: 0.05              # 5% error rate triggers shutdown

  # 10GbE Speed Optimizations
  enable_latency_based_stops: true   # Adjust stops based on network latency
  position_scaling_speed: "fast"     # Faster position adjustments
  enable_dynamic_sizing: true        # Size positions based on latency measurements

  # Volatility-adjusted limits (live loop): tighter max position / daily loss when vol is high
  use_volatility_adjusted_limits: true    # Scale limits by realized_vol_pct (computed from equity history each cycle)
  realized_vol_pct: 0.0                    # Overwritten each cycle from equity returns; 0 = no adjustment until enough history

  # PR-14 portfolio guardrails (cost/risk first)
  portfolio_var_limit_pct: 0.0             # 0 disables; e.g. 0.03 = block new risk when 95% VaR >= 3%
  portfolio_cvar_limit_pct: 0.0            # 0 disables; e.g. 0.05 = block when CVaR >= 5%
  portfolio_var_confidence: 0.95
  portfolio_var_lookback_trades: 50
  cluster_drawdown_brake_pct: 0.0          # 0 disables; blocks new risk when cluster drawdown exceeds limit
  target_cluster_cap_pct: 0.40             # cluster risk budget as fraction of equity
  risk_cluster_map: {}                     # optional map, e.g. {"BTC/USD":"majors","SOL/USD":"alts"}
  portfolio_vol_target_pct: 2.0            # realized vol target used for exposure scaling
  portfolio_liquidity_spread_ref_bps: 20.0 # spread reference for liquidity scaling
  portfolio_exposure_min_scale: 0.30       # floor scale so cap never collapses to zero

  # Circuit breaker & auto-reduce (live + paper): trip on drawdown; reduce size after N losses
  circuit_breaker_dd_pct: 8.0             # Trip circuit breaker when drawdown >= 8%
  var_breach_pct: 5.0                      # VaR breach threshold (pct) for circuit breaker
  var_breach_alert_enabled: true           # Emit rec_event(stage=var_breach_alert) when VaR breach
  auto_reduce_after_n_losses: 3            # After N consecutive losses, reduce position size
  auto_reduce_factor: 0.6                  # Size multiplier when auto-reduce active (0.6 = 60%)

  # Emergency shutdown: extra conditions (doc §8: use all risk levers)
  emergency_shutdown:
    enabled: true
    latency_spike_ms: 30000    # trip if cycle took > 30s (ms)
    flash_crash_pct: 15.0      # trip if any symbol moved > 15% in one cycle
    network_fail: true         # trip when exchange unreachable (set by data layer)
    arb_spread_bps: 500        # trip if spread > 500 bps (optional)

# ============================================================================
# EXCHANGE SETTINGS
# ============================================================================
exchanges:
  primary: "kraken"
  secondary: "coinbase_advanced"
  use_ccxt: true              # Use CCXT for primary exchange (data/ccxt_data_provider); market data + execution via ccxt)
  supported:
    - "kraken"
    - "coinbase_advanced"
  
  kraken:
    maker_fee: 0.0016                # 0.16%
    taker_fee: 0.0026                # 0.26%
    min_order_size: 0.0001
  
  coinbase_advanced:
    # Coinbase Advanced Trade (conservative default tier assumption)
    maker_fee: 0.006                 # 0.60%
    taker_fee: 0.008                 # 0.80%
    min_order_size: 1.0              # USD

# ============================================================================
# TRADING PAIRS (full universe – scanner constantly picks the best to trade)
# ============================================================================
# Best symbols for live and paper: highest liquidity = tightest spreads, least slippage.
# Used for both live trading and paper trading (single trading_pairs list).
best_symbols:
  - "BTC/USD"
  - "ETH/USD"
  - "SOL/USD"
  - "XRP/USD"
  - "LTC/USD"
  - "AVAX/USD"
  - "DOT/USD"
  - "LINK/USD"
  - "UNI/USD"
  - "ADA/USD"
  - "DOGE/USD"

# Live and paper trading both use this list (same universe).
trading_pairs:
  - "BTC/USD"
  - "ETH/USD"
  - "SOL/USD"
  - "XRP/USD"
  - "LTC/USD"
  - "AVAX/USD"
  - "DOT/USD"
  - "LINK/USD"
  - "UNI/USD"
  - "ADA/USD"
  - "DOGE/USD"

# ============================================================================
# COMMISSION & SLIPPAGE
# ============================================================================
execution:
  slippage_pct: 0.0015               # Tighter slippage assumption (improved execution)
  commission_reserve_pct: 0.05       # Reserve 5% for fees
  signal_cooldown_bars: 4            # Min bars between trades (4 = balance quality vs frequency)

# ============================================================================
# CONTINUOUS BEST-TRADE SCANNER (peak mode: parallel, liquidity, diversity)
# ============================================================================
continuous_scan:
  enabled: true
  interval_seconds: 10.0       # Base rescan interval (5–60s)
  top_n: 4                       # Concentrate on 4 best (doc §2: match allocator max_total_signals)
  use_cached_best: true         # Main loop uses scanner's best list when fresh
  max_age_seconds: 30.0         # Cache considered stale after this; fallback to AI brain
  # Peak mode (scanner at its best)
  parallel_sources: true       # Gather AI brain + strategy engine + HFT in parallel
  use_liquidity_boost: true     # Boost score for tighter order book spread
  liquidity_spread_pct_cap: 0.05  # Spreads tighter than this get max liquidity bonus
  diversity_max_per_symbol: 2   # Max opportunities per symbol in top N (avoid all one pair)
  diversity_max_per_strategy: 2 # Max per strategy (avoid all one strategy)
  adaptive_interval_enabled: true  # Shorten interval when opportunities found, lengthen when empty
  min_interval_seconds: 5.0     # Fastest rescan (peak responsiveness)
  max_interval_seconds: 30.0    # Slowest when cache empty
  max_symbols_per_scan: 25      # Pairs per scan (rotates through full list so all get scanned)
  # Multi-timeframe: primary TF (e.g. 1h) for trend, entry TF (e.g. 15m) for entries; keep only when both agree (best way: fewer, better signals)
  signal_multi_timeframe_enabled: true
  signal_primary_timeframe: "1h"
  signal_entry_timeframe: "15m"
  # External alpha: set to true and set URL when you have a signal API (best way #11)
  external_alpha_enabled: false
  external_alpha_url: ""
  external_alpha_timeout_seconds: 5.0
  # Strategy plugins: list of module paths providing get_strategies(config) -> {name: strategy}
  strategy_plugin_modules: []
  # Optional module: universe_builder – refresh trading_pairs by real volume (CCXT) every N cycles
  dynamic_universe_enabled: true
  dynamic_universe_interval_cycles: 100  # Refresh every 100 cycles (~17 min at 10s interval)
  dynamic_universe_top_n: 15

# ============================================================================
# LIQUIDITY SCANNER (scan exchange for best liquidity, rank pairs)
# ============================================================================
liquidity_scanner:
  enabled: true
  exchange_id: "kraken"
  quote_currencies: ["USD"]
  max_pairs: 15               # Return top 15 by liquidity score
  min_volume_usd: 50000       # Skip pairs with <$50K daily volume
  depth_levels: 10             # Order book depth levels to analyze
  scan_interval_cycles: 50     # Re-scan every 50 cycles (~8 min at 10s interval)
  batch_size: 5                # Fetch order books in batches of 5
  batch_delay_s: 1.0           # Delay between batches (rate limiting)
  cache_ttl_s: 60.0            # Cache results for 60s
  auto_update_pairs: true      # Automatically update trading_pairs with top results
  # Score weights (must sum to 1.0)
  w_volume: 0.40               # 24h volume weight
  w_spread: 0.30               # Bid-ask spread weight
  w_depth: 0.20                # Order book depth weight
  w_imbalance: 0.10            # Flow imbalance weight (balanced = better)

# ============================================================================
# EDGE-COST GATE (only trade when expected edge clearly exceeds costs)
# Profitability: strict gate = fewer trades, higher expected edge per trade.
# ============================================================================
edge_cost_gate:
  enabled: true
  modes: ["paper", "backtest", "live"]   # live: gate applies in production (strict entry)
  min_edge_pct: 0.50                # Relaxed from 0.85% — backtest showed signals are profitable at lower edge
  buffer_mult: 1.5                  # Edge must exceed cost by 1.5x (was 2x; still filters negative-edge)
  live_min_edge_pct: 0.65           # In live: require 0.65% min edge (was 1.0%)
  live_buffer_mult: 1.8             # In live: edge must exceed cost by 1.8x (was 2.2x)
  fee_mult: 2.0
  slippage_mult: 2.0

# ============================================================================
# AI BRAIN SETTINGS (PINNACLE AI) - MAX EARNINGS AT $1K
# ============================================================================
ai_brain:
  enabled: true
  consciousness_enabled: true
  swarm_intelligence_enabled: true
  num_ai_agents: 80                 # Slightly more agents for better signal diversity
  # Profitability: higher bar = only high-conviction trades (fewer but better)
  min_signal_confidence: 0.62       # Lowered from 0.76 — 64% win rate proves signal quality at lower thresholds
  live_min_signal_confidence: 0.72  # Live: 0.72+ (was 0.80; proportional reduction)
  max_concurrent_signals: 5          # Up to 5 signals — capture more opportunities across all symbols (was 2)
  # Drawdown-adaptive confidence (Phase 3): threshold auto-adjusts based on current drawdown
  dd_adaptive_confidence_enabled: true
  dd_adaptive_conf_floor: 0.50      # Threshold when drawdown = 0% (most aggressive)
  dd_adaptive_conf_ceiling: 0.85    # Threshold when drawdown = max_drawdown_pct (most conservative)

  # 10GbE Speed Enhancements
  enable_arbitrage_boost: true       # Leverage speed for arbitrage detection
  enable_flash_signals: true         # Microsecond opportunity detection
  latency_optimization: true         # Optimize for <1μs network latency

  agents:
    market_analyst: true
    risk_manager: true
    execution_specialist: true
    sentiment_analyst: true
    arbitrage_detector: true
    regime_detector: true
    momentum_trader: true
    mean_reversion_trader: true

  consciousness:
    market_sentiment_weight: 0.25
    fear_greed_weight: 0.15
    pattern_recognition_weight: 0.30
    intuition_weight: 0.30

  quantum_optimization:
    enabled: true
    method: "quantum_approximate"
    risk_parity: true

# ============================================================================
# STRATEGY PACK (optional additional strategies)
# ============================================================================
# PINNACLE: positive-edge only. Scanner + main loop enforce whitelist when non-empty.
strategies:
  enabled:
    - "hunter"
    - "shadow"
    - "momentum"
    - "mean_reversion"
    - "trend_following"
    - "quantum_momentum_elite"
    - "quantum_mean_reversion_elite"
    - "quantum_trend_following_elite"
  max_extra_signals: 2
  # Absolute pinnacle: ONLY these strategies may emit (paper PnL EMA positive: akashic, unified_engine, quantum_momentum_elite)
  strategy_whitelist: ["akashic_tier", "unified_engine", "quantum_momentum_elite", "regime_aligned", "volume_momentum", "mean_reversion", "breakout_bb", "macd_trend"]
  use_regime_lstm_boost: true        # When true, scale signal confidence by ml.regime_boost (Priority 2 recommended)
  use_volatility_regime_scale: true  # Scale down confidence in high vol (doc §6: regime/vol-aware)
  volatility_regime_high_threshold: 0.02
  use_funding_rate_filter: true      # Skip long when funding rate >= threshold (doc §6: avoid expensive longs)
  # funding_rates_url: ""            # Optional: HTTP URL for funding rates JSON; else CCXT
  funding_rate_skip_long_threshold: 0.0001  # 0.01% = skip long when rate >= this
  # Regime-based filter: only allow trend strategies in trend regime, mean-reversion in range (see docs)
  regime_filter_enabled: true
  regime_filter_trend_strategies: ["trend_following", "quantum_trend_following_elite"]
  regime_filter_mr_strategies: ["mean_reversion", "quantum_mean_reversion_elite"]

