# Argus Secret template — Push 64
# Replace <base64-encoded-value> with: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: argus-secrets
  namespace: argus-system
  labels:
    app.kubernetes.io/name: argus-ultimate
type: Opaque
data:
  ARGUS_EXCHANGE_API_KEY: <base64-encoded-value>
  ARGUS_EXCHANGE_API_SECRET: <base64-encoded-value>
  ARGUS_TG_BOT_TOKEN: <base64-encoded-value>
  ARGUS_TG_CHAT_ID: <base64-encoded-value>
  ARGUS_DISCORD_WEBHOOK_URL: <base64-encoded-value>
