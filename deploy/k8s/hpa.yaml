# Argus HorizontalPodAutoscaler — Push 64
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argus-hpa
  namespace: argus-system
  labels:
    app.kubernetes.io/name: argus-ultimate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argus
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
