# Argus Service — Push 64
apiVersion: v1
kind: Service
metadata:
  name: argus
  namespace: argus-system
  labels:
    app.kubernetes.io/name: argus-ultimate
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: argus
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
