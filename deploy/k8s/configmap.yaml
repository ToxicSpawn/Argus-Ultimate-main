# Argus ConfigMap — Push 64
apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-config
  namespace: argus-system
  labels:
    app.kubernetes.io/name: argus-ultimate
data:
  argus.yaml: |
    version: "1"
    env: production

    server:
      host: "0.0.0.0"
      port: 8080
      workers: 1
      log_level: info

    exchange:
      name: bybit
      api_key: "${ARGUS_EXCHANGE_API_KEY:-}"
      api_secret: "${ARGUS_EXCHANGE_API_SECRET:-}"
      testnet: false
      symbols:
        - BTCUSDT
        - ETHUSDT
        - SOLUSDT

    risk:
      max_position_usd: 10000.0
      max_daily_loss_usd: 500.0
      max_drawdown_pct: 10.0
      min_confidence: 0.60
      max_open_positions: 5
      halt_on_drawdown: true

    alerts:
      enabled: true
      min_level: WARNING

    logging:
      level: INFO
      json_logs: true
