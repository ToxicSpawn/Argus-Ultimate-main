# Hetzner production overrides (Push 85)
# helm upgrade --install argus ./helm/argus --namespace argus -f deploy/hetzner/values-prod.yaml

argus:
  image:
    tag: "8.21.0"
  resources:
    requests:
      cpu: "1000m"
      memory: "1Gi"
    limits:
      cpu: "3000m"
      memory: "4Gi"
  command: ["python", "run_ultimate.py"]
  env:
    - name: ARGUS_ENV
      value: production
    - name: ARGUS_LOG_LEVEL
      value: INFO
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: TZ
      value: Australia/Sydney
  persistence:
    size: 20Gi

grafana:
  adminPassword: "CHANGE_ME"
  persistence:
    size: 10Gi

prometheus:
  server:
    retention: "30d"
    persistentVolume:
      size: 50Gi
  alertmanager:
    persistence:
      size: 5Gi

ingress:
  enabled: false  # enable when domain is configured
