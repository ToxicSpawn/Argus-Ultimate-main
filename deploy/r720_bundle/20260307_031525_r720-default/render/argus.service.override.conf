[Service]
User=argus
Group=argus
WorkingDirectory=/opt/argus/repo
CPUAffinity=4-15
Nice=-10
IOSchedulingClass=realtime
IOSchedulingPriority=0
LimitMEMLOCK=infinity
Environment=ARGUS_OS_CPUS=0-3
Environment=ARGUS_EXEC_CPUS=4-15
Environment=ARGUS_CPU_ISOLATION=4-15
Environment=ARGUS_IFACE=enp3s0f0
Environment=ARGUS_LOG_DIR=/opt/argus/logs
