# Argus Prometheus scrape config — Push 64
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: argus-ultimate
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: argus
    static_configs:
      - targets:
          - argus:8080
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: redis
    static_configs:
      - targets:
          - argus-redis:6379
